services:
  nenko-db:
    image: postgres:16-alpine
    container_name: nenko-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nenko
      POSTGRES_USER: nenko
      POSTGRES_PASSWORD: nenko_dev_password
    ports:
      - "55437:5432"
    volumes:
      - nenko-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nenko -d nenko"]
      interval: 5s
      timeout: 5s
      retries: 20

  nenko-app:
    build: .
    container_name: nenko-app
    restart: unless-stopped
    depends_on:
      nenko-db:
        condition: service_healthy
      nenko-ntfy:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 7319
      DATABASE_URL: postgres://nenko:nenko_dev_password@nenko-db:5432/nenko
      NTFY_DEFAULT_SERVER_URL: http://nenko-ntfy
      NTFY_DEFAULT_TOPIC: nenko-reminders
    ports:
      - "7319:7319"

  nenko-ntfy:
    image: binwiederhier/ntfy:v2.22
    container_name: nenko-ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: http://127.0.0.1:7721
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
    ports:
      - "7721:80"
    volumes:
      - nenko-ntfy-cache:/var/cache/ntfy

volumes:
  nenko-postgres-data:
  nenko-ntfy-cache:
